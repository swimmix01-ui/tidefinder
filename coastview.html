<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>코스트뷰 CoastView - 연안 지형 확인</title>
<!-- ※ 지난 버전은 좌표를 먼저 읽은 뒤 document.createElement('script')로 동적 생성해서
     끼워넣는 방식이었는데, 이게 "등록하신 API Key와 URI가 일치하지 않습니다" 에러의
     원인이었을 가능성이 있다. 실제로 작동하는 다른 브이월드 3D 프로젝트 소스코드를
     참고해보니, 전부 이렇게 head에 고정된 <script> 태그로 정적으로 불러오고 있었다.
     동적 삽입 + 새 탭(window.open) 조합이 사파리에서 Referer 헤더를 다르게 처리했을
     가능성이 있어, 검증된 방식(정적 로딩)으로 통일한다. 좌표 확보는 이 스크립트가
     다 불러와진 뒤, 아래 body의 별도 스크립트에서 처리한다. -->
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=719EABC5-66AC-3B3C-83CA-9EE32B0F6208"></script>
<style>
  :root {
    --bg-deep: #081826;
    --bg-mid: #0E2A44;
    --card: #123A5E;
    --border: rgba(255,255,255,0.09);
    --text-hi: #EAF4FF;
    --text-lo: #8FB3D9;
    --cyan: #22D3EE;
    --red: #FF5C5C;
    --amber: #FBBF24;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-deep); }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
    color: var(--text-hi);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); background: var(--bg-mid); flex-shrink: 0; z-index: 10;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 800; }
  header .cyan { color: var(--cyan); }
  .backbtn {
    width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .backbtn svg { width: 18px; height: 18px; color: var(--cyan); }
  #coordBar {
    font-size: 12px; color: var(--text-lo); padding: 8px 16px; background: var(--card);
    border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  #coordBar b { color: var(--cyan); }
  #mapWrap { position: relative; flex: 1; min-height: 0; }
  #vmap { width: 100%; height: 100%; }
  #statusOverlay {
    position: absolute; inset: 0; background: var(--bg-deep); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; z-index: 5; padding: 20px; text-align: center;
  }
  #statusOverlay.hide { display: none; }
  .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(34,211,238,0.2); border-top-color: var(--cyan); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #statusText { font-size: 14px; color: var(--cyan); font-weight: 700; }
  #statusSub { font-size: 12.5px; color: var(--text-lo); max-width: 320px; line-height: 1.6; }
  #errBox {
    display: none; position: absolute; top: 12px; left: 12px; right: 12px; z-index: 8;
    background: rgba(255,92,92,0.12); border: 1px solid rgba(255,92,92,0.4); border-radius: 10px;
    padding: 10px 14px; font-size: 12.5px; color: var(--red); font-weight: 600; line-height: 1.6;
  }
  #noCoordForm {
    display: none; position: absolute; inset: 0; z-index: 6; background: var(--bg-deep);
    flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px;
  }
  #noCoordForm.show { display: flex; }
  #noCoordForm p { color: var(--text-lo); font-size: 13px; text-align: center; margin: 0 0 6px; line-height: 1.6; }
  .coordInputs { display: flex; gap: 8px; }
  .coordInputs input {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-hi);
    padding: 10px; border-radius: 10px; font-size: 15px; width: 140px; text-align: center;
  }
  #goBtn {
    padding: 12px 28px; font-size: 14px; font-weight: 800; color: #06222E;
    background: linear-gradient(135deg, var(--cyan), #4EE3FF); border: none; border-radius: 10px; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <button class="backbtn" onclick="history.back()" type="button" aria-label="뒤로가기">
    <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <h1>코스트뷰 <span class="cyan">CoastView</span></h1>
</header>

<div id="coordBar">
  <span>사고좌표 3D 지형 확인 · <b id="coordLabel">-</b></span>
  <span>출처: 국토교통부 브이월드(V-World)</span>
</div>

<div id="mapWrap">
  <div id="errBox"></div>
  <div id="vmap"></div>
  <div id="statusOverlay">
    <div class="spinner"></div>
    <div id="statusText">3D 지형 불러오는 중...</div>
    <div id="statusSub">브이월드 3D 지도 API에 접속하고 있습니다. 신호가 약하면 시간이 더 걸릴 수 있습니다.</div>
  </div>
  <div id="noCoordForm">
    <p>사고좌표가 전달되지 않았습니다.<br>TideFinder에서 "3D 지형 보기" 버튼으로 들어오면 좌표가 자동 입력됩니다.<br>직접 확인하실 좌표를 입력하셔도 됩니다.</p>
    <div class="coordInputs">
      <input id="manualLat" type="number" step="0.0001" placeholder="위도 (예: 36.0248)">
      <input id="manualLon" type="number" step="0.0001" placeholder="경도 (예: 129.4899)">
    </div>
    <button id="goBtn" type="button">3D 지형 보기</button>
  </div>
</div>

<script>
  function getParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function showError(msg) {
    const box = document.getElementById('errBox');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
    document.getElementById('statusOverlay').classList.add('hide');
  }

  function initMap(lat, lon) {
    document.getElementById('coordLabel').textContent = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
    try {
      if (typeof vw === 'undefined') {
        showError('브이월드 3D 엔진이 로드되지 않았습니다. API 키 또는 도메인 등록 상태를 확인하세요.');
        return;
      }
      const map = new vw.Map();
      const options = {
        mapId: 'vmap',
        initPosition: new vw.CameraPosition(
          new vw.CoordZ(lon, lat, 900),
          new vw.Direction(0, -45, 0)
        ),
        logo: false,
        navigation: true,
      };
      map.setOption(options);
      map.setMapId('vmap');
      map.start();
      document.getElementById('statusOverlay').classList.add('hide');
    } catch (err) {
      showError('3D 지도 초기화 중 오류: ' + (err && err.message ? err.message : err));
    }
  }

  window.onload = function () {
    // 정적으로 로드된 브이월드 스크립트가 이 시점엔 이미 실행 완료된 상태여야 정상.
    // vw가 없다면 인증(도메인) 실패로 스크립트 자체가 빈 채로 내려온 것.
    if (typeof vw === 'undefined') {
      showError('브이월드 인증 실패 - API 키에 등록된 서비스 URL과 현재 접속 주소가 일치하지 않습니다. 브이월드 인증키 관리에서 도메인 등록 상태를 다시 확인하세요.');
    }

    const latParam = getParam('lat');
    const lonParam = getParam('lon');

    if (latParam && lonParam && !isNaN(parseFloat(latParam)) && !isNaN(parseFloat(lonParam))) {
      initMap(parseFloat(latParam), parseFloat(lonParam));
    } else if (typeof vw !== 'undefined') {
      document.getElementById('statusOverlay').classList.add('hide');
      document.getElementById('noCoordForm').classList.add('show');
      document.getElementById('goBtn').addEventListener('click', () => {
        const la = parseFloat(document.getElementById('manualLat').value);
        const lo = parseFloat(document.getElementById('manualLon').value);
        if (isNaN(la) || isNaN(lo)) { alert('위도·경도를 숫자로 입력해주세요.'); return; }
        document.getElementById('noCoordForm').classList.remove('show');
        document.getElementById('statusOverlay').classList.remove('hide');
        initMap(la, lo);
      });
    }
  };
</script>

</body>
</html>
