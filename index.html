<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타이드파인더(TideFinder) - 해양 실종자 표류예측 시스템</title>
<style>
  :root {
    --bg-deep: #081826;
    --bg-mid: #0E2A44;
    --card: #123A5E;
    --card-soft: #163F63;
    --border: rgba(255,255,255,0.09);
    --text-hi: #EAF4FF;
    --text-lo: #8FB3D9;
    --cyan: #22D3EE;
    --cyan-dim: #0E7C93;
    --red: #FF5C5C;
    --green: #34D399;
    --amber: #FBBF24;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
    margin: 0; padding: 0;
    background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 340px, #0A2138 100%);
    color: var(--text-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 22px 20px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    width: 42px; height: 42px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    background: radial-gradient(circle at 30% 30%, #1B4E77, #0A2138);
    box-shadow: 0 0 0 1px rgba(34,211,238,0.35), 0 4px 14px rgba(0,0,0,0.4);
  }
  header h1 {
    margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
    color: var(--text-hi);
  }
  header .tagline {
    margin: 2px 0 0; font-size: 12px; color: var(--text-lo); letter-spacing: 0.02em;
  }

  main { padding: 16px; max-width: 720px; margin: 0 auto; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .card-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: var(--cyan);
    letter-spacing: 0.03em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .card-title .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 13px; font-weight: 600; color: var(--text-lo);
    margin-bottom: 7px; display: block;
  }
  .dms-row { display: flex; gap: 6px; align-items: center; }
  .dms-row input { flex: 1; min-width: 0; }
  .unit-tag { font-size: 12px; color: var(--text-lo); flex-shrink: 0; width: 12px; text-align: center; }
  input[type=number], input[type=date],
